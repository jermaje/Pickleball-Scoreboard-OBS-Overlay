<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Scoreboard - Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent !important;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow: hidden;
            gap: 16px;
        }

        .scoreboard {
            display: flex;
            width: min(1180px, calc(100% - 40px));
            height: min(780px, calc(100% - 40px));
            gap: 0;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 18px 60px rgba(2,8,23,0.6);
        }

        .left-panel {
            flex: 1 1 70%;
            background: linear-gradient(180deg,#3f4f67 0%, #35465a 60%);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .right-panel {
            width: 220px;
            background: linear-gradient(180deg,#12325a 0%, #102842 100%);
            display: flex;
            flex-direction: column;
            padding: 28px 24px;
        }

        .team-name {
            color: #fff;
            font-size: 56px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .score-block {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 18px;
            padding: 14px 12px;
        }

        .indicator {
            width: 52px;
            height: 52px;
            background: #ffd400;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(255,212,0,0.25);
            flex-shrink: 0;
            margin-right: 8px;
        }

        .indicator.hidden { opacity: 0.12; }

        .player-row {
            height: 50%;
            display: flex;
            align-items: center;
            padding-left: 24px;
            position: relative;
        }

        .player-name {
            color: #ffffff;
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .score-row {
            height: 50%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .serve-container {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .serve-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #ffd400;
            box-shadow: 0 8px 22px rgba(255,200,0,0.25);
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #0d1321;
            font-size: 18px;
            font-weight: 900;
            transition: all 0.2s ease;
        }

        .serve-dot.hidden {
            visibility: hidden !important;
        }

        .serve-dot.inactive {
            opacity: 0.12;
            box-shadow: none;
        }



        .score-number {
            color: #ffffff;
            font-size: 72px;
            font-weight: 900;
            line-height: 1;
        }

        #reset-display-btn {
            position: absolute;
            bottom: 14px;
            right: 14px;
            z-index: 80;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .indicator.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .score {
            font-size: clamp(90px, 14vw, 140px);
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 20px 35px rgba(0, 0, 0, 0.35);
            min-width: 180px;
            text-align: right;
        }

        @media (max-width: 1200px) {
            .scoreboard {
                padding: 30px 40px;
                gap: 50px;
            }

            .team-name {
                font-size: 54px;
            }

            .score {
                font-size: 100px;
                min-width: 140px;
            }

            .indicator {
                width: 90px;
                height: 90px;
            }
        }

        @media (max-width: 900px) {
            .scoreboard {
                flex-direction: column;
                padding: 30px 20px;
                gap: 40px;
                justify-content: center;
            }

            .right-section {
                align-items: flex-end;
            }

            .team-name {
                font-size: 42px;
                text-align: center;
            }

            .score {
                font-size: 70px;
                text-align: center;
                min-width: 100px;
            }

            .indicator {
                width: 70px;
                height: 70px;
            }

            .brand {
                font-size: 22px;
            }
        }

        @media (max-width: 600px) {
            .scoreboard {
                padding: 20px;
                gap: 20px;
            }

            .team-name {
                font-size: 28px;
            }

            .score {
                font-size: 50px;
                min-width: 80px;
            }

            .indicator {
                width: 50px;
                height: 50px;
            }

            .score-row {
                gap: 20px;
            }

            .brand {
                font-size: 18px;
            }
        }

        .brand {
            font-size: 28px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .match-category {
            font-size: clamp(20px, 4vw, 36px);
            font-weight: 900;
            color: #ffd400;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
            z-index: 10;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="match-category" id="match-category">MIXED DOUBLES</div>
    <div class="scoreboard">
        <div class="left-panel">
            <div class="player-row" id="player1-row">
                <div class="player-name" id="player1-name">FIRST PLAYER</div>
            </div>

            <div class="player-row" id="player2-row">
                <div class="player-name" id="player2-name">SECOND PLAYER</div>
            </div>
        </div>

        <div class="right-panel">
            <div class="score-row">
                <div class="score-number" id="team1-score">0</div>
                <div class="serve-container">
                    <div class="serve-dot hidden" id="serve-1"></div>
                </div>
            </div>
            <div class="score-row">
                <div class="score-number" id="team2-score">0</div>
                <div class="serve-container">
                    <div class="serve-dot hidden" id="serve-2"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="brand">Camsur Pickleball Club</div>
    <button id="reset-display-btn" title="Reset display scores">Reset</button>

    <script>
        let displayPausedUntil = 0;
        function renderDisplay(data) {
            const t1 = typeof data.team1Score === 'number' ? data.team1Score : (data.team1Score ? Number(data.team1Score) : 0);
            const t2 = typeof data.team2Score === 'number' ? data.team2Score : (data.team2Score ? Number(data.team2Score) : 0);
            const p1 = document.getElementById('player1-name');
            const p2 = document.getElementById('player2-name');
            const sc1 = document.getElementById('team1-score');
            const sc2 = document.getElementById('team2-score');
            const cat = document.getElementById('match-category');

            const s1 = document.getElementById('serve-1');
            const s2 = document.getElementById('serve-2');

            if (p1) p1.textContent = (data.team1Name || 'FIRST PLAYER').toUpperCase();
            if (p2) p2.textContent = (data.team2Name || 'SECOND PLAYER').toUpperCase();
            if (sc1) sc1.textContent = t1;
            if (sc2) sc2.textContent = t2;
            if (cat) cat.textContent = (data.category || 'MIXED DOUBLES').toUpperCase();

            const serving = data.serving || 1;

            if (s1 && s2) {
                if (serving === 1) {
                    s1.classList.remove('hidden');
                    s2.classList.add('hidden');
                } else {
                    s1.classList.add('hidden');
                    s2.classList.remove('hidden');
                }
            }
        }

        async function updateDisplay() {
            if (Date.now() < displayPausedUntil) return; // temporarily paused after manual reset
            let data = null;
            let online = false;

            try {
                const resp = await fetch('/state', { cache: 'no-store' });
                if (resp.ok) {
                    data = await resp.json();
                    online = true;
                }
            } catch (e) {
                online = false;
            }

            if (!data) {
                try {
                    const saved = localStorage.getItem('pickleballScore');
                    if (saved) {
                        data = JSON.parse(saved);
                    }
                } catch (e) {
                    data = null;
                }
            }

            if (data) {
                renderDisplay(data);
            }
        }

        setInterval(updateDisplay, 500);
        updateDisplay();

        // Reset / pause display controls
        function resetDisplay() {
            // zero visible score numbers
            const a = document.getElementById('team1-score');
            const b = document.getElementById('team2-score');
            if (a) a.textContent = '0';
            if (b) b.textContent = '0';
            // hide serve dots
            ['serve-1', 'serve-2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
            // pause automatic updates for 30s so the reset stays visible
            displayPausedUntil = Date.now() + 30000;
            const btn = document.getElementById('reset-display-btn');
            if (btn) { btn.textContent = 'Unpause'; btn.dataset.paused = '1'; }
        }

        function unpauseDisplay() {
            displayPausedUntil = 0;
            const btn = document.getElementById('reset-display-btn');
            if (btn) { btn.textContent = 'Reset'; btn.dataset.paused = '0'; }
            updateDisplay();
        }

        document.getElementById('reset-display-btn').addEventListener('click', (e) => {
            const btn = e.currentTarget;
            if (btn.dataset.paused === '1') {
                unpauseDisplay();
            } else {
                resetDisplay();
            }
        });
    </script>
</body>
</html>
